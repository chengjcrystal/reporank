name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fetch frozen eval index (for the ranking gate)
        # The 157k-repo frozen index is too large to commit, so it lives as a
        # GitHub release asset. Downloading it here makes the ranking-regression
        # gate enforce in cloud CI against the identical snapshot used locally.
        # If the asset is not present yet, the gate test skips (stays green)
        # rather than breaking the build.
        run: |
          curl -fsSL -o eval_index.pkl \
            https://github.com/chengjcrystal/reporank/releases/download/eval-index-v1/eval_index.pkl \
            && echo "frozen eval index downloaded; gate will enforce" \
            || echo "frozen eval index not available; gate will skip"
      - name: Run tests (includes the ranking-regression gate)
        run: pytest -q
