name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests (includes the ranking-regression gate)
        # The gate test scores nDCG against the frozen eval index. That snapshot
        # is built from the crawled corpus (`python -m app.cli freeze-eval`) and
        # is gitignored, so on a stock runner the gate test SKIPS rather than
        # fails. To enforce the gate in cloud CI, restore eval_index.pkl from a
        # cache/artifact before this step. It runs for real in local pre-push CI.
        run: pytest -q
